<!DOCTYPE HTML>

<html lang="es">
<head>
    <!-- Datos que describen el documento -->
    <meta charset="UTF-8">

    <!--Metadatos de los documentos HTML5-->
    <meta name ="author" content ="Daniel Suárez de la Roza">
    <meta name ="description" content ="Formuario de opinión de Embers.js">
    <meta name ="keywords" content ="Embers.js, formulario, opinión">

    <!--Definición de la ventana gráfica-->
    <meta name ="viewport" content ="width=device-width, initial-scale=1.0">


    <title>Embers.js - Formulario</title>
    <!-- añadir el elemento link de enlace a la hoja de estilo dentro del <head> del documento html -->
    <link rel="stylesheet" type="text/css" href="estilo/estilo.css">
</head>

<body>
    <!-- Datos con el contenidos que aparece en el navegador -->
    <header>
        <h1>Embers.js</h1>
    </header>
    <aside>
        <nav>
            <a title="Principal" accesskey="P" tabindex="1" href="index.html">Página principal</a>
            <a title="Conceptos" accesskey="C" tabindex="2" href="conceptos.html">Conceptos</a>
            <a title="Modelos" accesskey="M" tabindex="3" href="modelos.html">Modelos</a>
            <a title="Formulario" accesskey="F" tabindex="4" href="formulario.html">Formulario</a>
        </nav>
    </aside>
    <main>
        <section>
            <h2>Formulario</h2>
            <p>Cuéntanos tu experiencia con Embers.js</p>
            <form name="formulario" id="form">
                <p><label for="nom">Nombre:</label><input id="nom" type="text"></p>
                <p><label for="ape">Apellidos:</label><input id="ape" type="text"></p>
                <p><label for="cor">Correo:</label><input id="cor" type="text"></p>
                <fieldset>
                    <legend>Género</legend>
                    <p><label for="mas"></label><input id="mas" type="radio" name="genero">Masculino
                    <label for="fem"></label><input id="fem" type="radio" name="genero">Femenino
                    <label for="otr"></label><input id="otr" type="radio" name="genero">Otro</p>
                </fieldset>
                <p><label>¿Cuáles de las siguientes características crees que mejor describen
                a Embers.js según tu experiencia?</label></p>
                <fieldset>
                    <legend>Puedes elegir más de una opción</legend>
                    <p><label for="int"></label><input id="int" type="checkbox" value="Intuitivo">Intuitivo</p>
                    <p><label for="fle"></label><input id="fle" type="checkbox" value="Flexible">Flexible</p>
                    <p><label for="com"></label><input id="com" type="checkbox" value="Cómodo">Cómodo</p>
                    <p><label for="est"></label><input id="est" type="checkbox" value="Estable">Estable</p>
                    <p><label for="pro"></label><input id="pro" type="checkbox" value="Productivo">Productivo</p>
                    <p><label for="coh"></label><input id="coh" type="checkbox" value="Coherente">Coherente</p>
                    <p><label for="org"></label><input id="org" type="checkbox" value="Organizado">Organizado</p>
                </fieldset>
                <p>Observaciones:</p>
                <p><label for="texta"></label><textarea id="texta" cols="20" rows="10"></textarea></p>
                <p><input type="button" id="env" value="Enviar"></p>
            </form>
        </section>
    </main>
    <footer>
        <picture>
            <img src="multimedia/emberjs.png" alt="Embers.js">
        </picture>
    </footer>
</body>
</html>
