<!DOCTYPE HTML>

<html lang="es">
<head>
    <!-- Datos que describen el documento -->
    <meta charset="UTF-8">
    <title>SEW.P3</title>
    <!-- añadir el elemento link de enlace a la hoja de estilo dentro del <head> del documento html -->
    <link rel="stylesheet" type="text/css" href="CalculadoraBasica.css">
    <script src="CalculadoraBasica.js"></script>
</head>

<body>
    <main>

        <header>
            <input type="Text" id="output" disabled>
        </header>
        <!-- label para Text: nata by MILAN-->

        <section>
            <input type="Button" name="btn7" value="7" onclick="p.write('7')">
            <input type="Button" name="btn8" value="8" onclick="p.write('8')">
            <input type="Button" name="btn9" value="9" onclick="p.write('9')">

            <input type="Button" name="btn4" value="4" onclick="p.write('4')">    
            <input type="Button" name="btn5" value="5" onclick="p.write('5')">
            <input type="Button" name="btn6" value="6" onclick="p.write('6')">
           
            <input type="Button" name="btn1" value="1" onclick="p.write('1')">    
            <input type="Button" name="btn2" value="2" onclick="p.write('2')">   
            <input type="Button" name="btn3" value="3" onclick="p.write('3')">
            
            <input type="Button" name="btn0" value="0" onclick="p.writeZero()">
            <input type="Button" name="btnPunto" value="." onclick="p.write('.')">
            <input type="Button" class="btnCalc" name="btnIgual" value="=" onclick="p.calc()"> 
        </section>  

        <nav>
            <input type="Button" class="btnOn" name="btnOn" value="ON/C" onclick="p.removeAll()">
            <input type="Button" class="btnCE" name="btnCE" value="CE" onclick="p.removeAll()">
            <input type="Button" class="btnMasMenos" name="btnMasMenos" value="+/-" onclick="p.opposite()">
            <input type="Button" class="btnOperacion" name="btnRaiz" value="√" onclick="p.squareRoot()">
            <input type="Button" class="btnOperacion" name="btnPorc" value="%" onclick="p.percentage()">
        </nav>

        <aside>
            <input type="Button" class="btnOperacion" name="btnMult" value="*" onclick="p.writeOperator('*')">
            <input type="Button" class="btnOperacion" name="btnDiv" value="/" onclick="p.writeOperator('/')">

            <input type="Button" class="btnOperacion" name="btnMenos" value="-" onclick="p.writeOperator('-')">
            <input type="Button" class="btnMemoria" name="btnMrc" value="MRC" onclick="p.showMemory()">

            <input type="Button" class="btnOperacion" name="btnMas" value="+" onclick="p.writeOperator('+')">
            <input type="Button" class="btnMemoria" name="btnMemMenos" value="M-" onclick="p.subtractMemory()">

            <input type="Button" class="btnMemoria" name="btnMemMas" value="M+" onclick="p.sumMemory()">
        </aside>
    </main> 

    <script>

        'use strict';
        
        document.addEventListener('keydown', (event) => {
          const keyName = event.key;
          p.pulsarTecla(keyName);
        });
        
        </script>
</body>
</html>
